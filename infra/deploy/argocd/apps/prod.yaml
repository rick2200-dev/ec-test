apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ec-marketplace-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ec-marketplace
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ec-marketplace

  source:
    repoURL: https://github.com/YOUR_ORG/ec-marketplace.git
    targetRevision: main
    path: infra/deploy/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: ec-marketplace

  syncPolicy:
    # Production requires manual sync - no automated block
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
