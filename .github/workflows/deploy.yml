name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image tags to ${{ inputs.environment }}
        run: |
          ENV="${{ inputs.environment }}"

          if [ "${ENV}" = "dev" ]; then
            echo "Dev environment is updated automatically on push to main."
            exit 0
          fi

          SOURCE_KUSTOMIZATION="deploy/overlays/dev/kustomization.yaml"
          TARGET_KUSTOMIZATION="deploy/overlays/${ENV}/kustomization.yaml"

          # Extract images block from dev and apply to target
          IMAGES=$(yq eval '.images' "${SOURCE_KUSTOMIZATION}")
          yq eval ".images = ${IMAGES}" -i "${TARGET_KUSTOMIZATION}"

      - name: Commit and push
        run: |
          ENV="${{ inputs.environment }}"
          if [ "${ENV}" = "dev" ]; then exit 0; fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "deploy/overlays/${ENV}/kustomization.yaml"
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: promote image tags to ${ENV} [skip ci]"
          git push
