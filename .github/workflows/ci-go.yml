name: Go CI

on:
  pull_request:
    paths:
      - "backend/services/**"
      - "backend/pkg/**"
      - "backend/proto/**"
      - "backend/gen/go/**"
      - "go.work"
      - "go.work.sum"
      - "infra/db/migrations/**"
      - ".github/workflows/ci-go.yml"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Each service filter includes its own code PLUS the cross-cutting
          # paths that any service depends on: shared Go packages, generated
          # proto code, workspace files, and DB migrations. These must be
          # duplicated per-filter because dorny/paths-filter turns every
          # top-level filter name into a matrix entry — introducing a
          # separate `shared` filter would try to run it as a pseudo-service.
          filters: |
            gateway:
              - 'backend/services/gateway/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            auth:
              - 'backend/services/auth/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            cart:
              - 'backend/services/cart/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            catalog:
              - 'backend/services/catalog/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            inventory:
              - 'backend/services/inventory/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            order:
              - 'backend/services/order/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            search:
              - 'backend/services/search/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            recommend:
              - 'backend/services/recommend/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            notification:
              - 'backend/services/notification/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'
            inquiry:
              - 'backend/services/inquiry/**'
              - 'backend/pkg/**'
              - 'backend/proto/**'
              - 'backend/gen/go/**'
              - 'go.work'
              - 'go.work.sum'
              - 'infra/db/migrations/**'
              - '.github/workflows/ci-go.yml'

  lint-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache-dependency-path: backend/services/${{ matrix.service }}/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend/services/${{ matrix.service }}
          args: --timeout=5m

      - name: Test
        run: |
          cd backend/services/${{ matrix.service }}
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/services/${{ matrix.service }}/coverage.out
          retention-days: 7
