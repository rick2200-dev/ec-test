name: Go CI

on:
  pull_request:
    paths:
      - "backend/services/**"
      - "backend/pkg/**"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway: ['backend/services/gateway/**', 'backend/pkg/**']
            auth: ['backend/services/auth/**', 'backend/pkg/**']
            catalog: ['backend/services/catalog/**', 'backend/pkg/**']
            inventory: ['backend/services/inventory/**', 'backend/pkg/**']
            order: ['backend/services/order/**', 'backend/pkg/**']
            search: ['backend/services/search/**', 'backend/pkg/**']
            recommend: ['backend/services/recommend/**', 'backend/pkg/**']
            notification: ['backend/services/notification/**', 'backend/pkg/**']

  lint-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache-dependency-path: backend/services/${{ matrix.service }}/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend/services/${{ matrix.service }}
          args: --timeout=5m

      - name: Test
        run: |
          cd backend/services/${{ matrix.service }}
          go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/services/${{ matrix.service }}/coverage.out
          retention-days: 7
