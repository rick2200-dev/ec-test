syntax = "proto3";

package review.v1;

option go_package = "github.com/Riku-KANO/ec-test/gen/go/review/v1;reviewv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// ReviewService provides product review operations.
service ReviewService {
  // Buyer operations
  rpc CreateReview(CreateReviewRequest) returns (CreateReviewResponse);
  rpc GetReview(GetReviewRequest) returns (GetReviewResponse);
  rpc UpdateReview(UpdateReviewRequest) returns (UpdateReviewResponse);
  rpc DeleteReview(DeleteReviewRequest) returns (DeleteReviewResponse);

  // Public queries
  rpc ListProductReviews(ListProductReviewsRequest) returns (ListProductReviewsResponse);
  rpc GetProductRating(GetProductRatingRequest) returns (GetProductRatingResponse);

  // Seller operations
  rpc ListSellerReviews(ListSellerReviewsRequest) returns (ListSellerReviewsResponse);
  rpc CreateReply(CreateReplyRequest) returns (CreateReplyResponse);
  rpc UpdateReply(UpdateReplyRequest) returns (UpdateReplyResponse);
  rpc DeleteReply(DeleteReplyRequest) returns (DeleteReplyResponse);
}

// Review represents a buyer's review of a product.
message Review {
  string id = 1;
  string tenant_id = 2;
  string buyer_auth0_id = 3;
  string product_id = 4;
  string seller_id = 5;
  string product_name = 6;
  int32 rating = 7;
  string title = 8;
  string body = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  ReviewReply reply = 12; // May be null if no reply exists
}

// ReviewReply represents a seller's reply to a review.
message ReviewReply {
  string id = 1;
  string tenant_id = 2;
  string review_id = 3;
  string seller_auth0_id = 4;
  string body = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ProductRating is the aggregate rating for a product.
message ProductRating {
  string tenant_id = 1;
  string product_id = 2;
  double average_rating = 3;
  int32 review_count = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// --- Request / Response messages ---

message CreateReviewRequest {
  string tenant_id = 1;
  string buyer_auth0_id = 2;
  string product_id = 3;
  int32 rating = 4;
  string title = 5;
  string body = 6;
}

message CreateReviewResponse {
  Review review = 1;
}

message GetReviewRequest {
  string tenant_id = 1;
  string review_id = 2;
}

message GetReviewResponse {
  Review review = 1;
}

message UpdateReviewRequest {
  string tenant_id = 1;
  string review_id = 2;
  string buyer_auth0_id = 3;
  optional int32 rating = 4;
  optional string title = 5;
  optional string body = 6;
}

message UpdateReviewResponse {
  Review review = 1;
}

message DeleteReviewRequest {
  string tenant_id = 1;
  string review_id = 2;
  string buyer_auth0_id = 3;
}

message DeleteReviewResponse {}

message ListProductReviewsRequest {
  string tenant_id = 1;
  string product_id = 2;
  common.v1.PaginationRequest pagination = 3;
}

message ListProductReviewsResponse {
  repeated Review reviews = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetProductRatingRequest {
  string tenant_id = 1;
  string product_id = 2;
}

message GetProductRatingResponse {
  ProductRating rating = 1;
}

message ListSellerReviewsRequest {
  string tenant_id = 1;
  string seller_id = 2;
  common.v1.PaginationRequest pagination = 3;
}

message ListSellerReviewsResponse {
  repeated Review reviews = 1;
  common.v1.PaginationResponse pagination = 2;
}

message CreateReplyRequest {
  string tenant_id = 1;
  string review_id = 2;
  string seller_auth0_id = 3;
  string seller_id = 4;
  string body = 5;
}

message CreateReplyResponse {
  ReviewReply reply = 1;
}

message UpdateReplyRequest {
  string tenant_id = 1;
  string review_id = 2;
  string seller_auth0_id = 3;
  string seller_id = 4;
  string body = 5;
}

message UpdateReplyResponse {
  ReviewReply reply = 1;
}

message DeleteReplyRequest {
  string tenant_id = 1;
  string review_id = 2;
  string seller_id = 3;
}

message DeleteReplyResponse {}
