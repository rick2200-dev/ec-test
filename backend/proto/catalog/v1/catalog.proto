syntax = "proto3";

package catalog.v1;

option go_package = "github.com/Riku-KANO/ec-test/gen/go/catalog/v1;catalogv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// CatalogService provides product and category management.
service CatalogService {
  // Products
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc UpdateProductStatus(UpdateProductStatusRequest) returns (UpdateProductStatusResponse);

  // Categories
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
}

// ─── Domain Messages ─────────────────────────────────────────

message Product {
  string id = 1;
  string tenant_id = 2;
  string seller_id = 3;
  string name = 4;
  string slug = 5;
  string description = 6;
  string status = 7;
  string attributes_json = 8;
  repeated SKU skus = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  // Primary image URL. Empty string if no image has been uploaded yet.
  string image_url = 12;
}

message SKU {
  string id = 1;
  string tenant_id = 2;
  string product_id = 3;
  string seller_id = 4;
  string sku_code = 5;
  common.v1.Money price = 6;
  string attributes_json = 7;
  string status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Category {
  string id = 1;
  string tenant_id = 2;
  string parent_id = 3;
  string name = 4;
  string slug = 5;
  int32 sort_order = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ─── ListProducts ────────────────────────────────────────────

message ListProductsRequest {
  string tenant_id = 1;
  string seller_id = 2;    // Optional: filter by seller
  string status = 3;       // Optional: filter by status
  string category_id = 4;  // Optional: filter by category
  common.v1.PaginationRequest pagination = 5;
}

message ListProductsResponse {
  repeated Product products = 1;
  common.v1.PaginationResponse pagination = 2;
}

// ─── GetProduct ──────────────────────────────────────────────

message GetProductRequest {
  string tenant_id = 1;
  oneof identifier {
    string id = 2;
    string slug = 3;
  }
}

message GetProductResponse {
  Product product = 1;
}

// ─── CreateProduct ───────────────────────────────────────────

message CreateProductRequest {
  string tenant_id = 1;
  string seller_id = 2;
  string name = 3;
  string slug = 4;
  string description = 5;
  string attributes_json = 6;
  repeated CreateSKURequest skus = 7;
  repeated string category_ids = 8;
}

message CreateSKURequest {
  string sku_code = 1;
  common.v1.Money price = 2;
  string attributes_json = 3;
}

message CreateProductResponse {
  Product product = 1;
}

// ─── UpdateProduct ───────────────────────────────────────────

message UpdateProductRequest {
  string tenant_id = 1;
  string id = 2;
  string name = 3;
  string description = 4;
  string attributes_json = 5;
}

message UpdateProductResponse {
  Product product = 1;
}

// ─── UpdateProductStatus ─────────────────────────────────────

message UpdateProductStatusRequest {
  string tenant_id = 1;
  string id = 2;
  string status = 3;  // draft, active, archived
}

message UpdateProductStatusResponse {
  Product product = 1;
}

// ─── ListCategories ──────────────────────────────────────────

message ListCategoriesRequest {
  string tenant_id = 1;
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

// ─── CreateCategory ──────────────────────────────────────────

message CreateCategoryRequest {
  string tenant_id = 1;
  string name = 2;
  string slug = 3;
  string parent_id = 4;  // Optional
  int32 sort_order = 5;
}

message CreateCategoryResponse {
  Category category = 1;
}
