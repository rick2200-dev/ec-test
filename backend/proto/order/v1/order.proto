syntax = "proto3";

package order.v1;

option go_package = "github.com/Riku-KANO/ec-test/gen/go/order/v1;orderv1";

import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// OrderService manages orders and payments.
//
// All buyer purchases flow through CreateCheckout, which accepts a flat list
// of items spanning one or more sellers and creates one Order per seller
// sharing a single Stripe PaymentIntent. The legacy single-seller
// CreateOrder RPC is deprecated and retained only for backwards
// compatibility with older generated code; do not use it for new callers.
service OrderService {
  rpc CreateCheckout(CreateCheckoutRequest) returns (CreateCheckoutResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {
    option deprecated = true;
  }
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListBuyerOrders(ListBuyerOrdersRequest) returns (ListBuyerOrdersResponse);
  rpc ListSellerOrders(ListSellerOrdersRequest) returns (ListSellerOrdersResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc ListPayouts(ListPayoutsRequest) returns (ListPayoutsResponse);

  // Order cancellation workflow. Buyer opens a request; seller approves
  // or rejects. Approval orchestrates Stripe refund + per-payout transfer
  // reversals + inventory release via Pub/Sub. See
  // docs/order-cancellation.md for the full flow.
  rpc RequestOrderCancellation(RequestOrderCancellationRequest) returns (RequestOrderCancellationResponse);
  rpc ApproveOrderCancellation(ApproveOrderCancellationRequest) returns (ApproveOrderCancellationResponse);
  rpc RejectOrderCancellation(RejectOrderCancellationRequest) returns (RejectOrderCancellationResponse);
  rpc ListOrderCancellationRequests(ListOrderCancellationRequestsRequest) returns (ListOrderCancellationRequestsResponse);
  rpc GetOrderCancellationRequest(GetOrderCancellationRequestRequest) returns (GetOrderCancellationRequestResponse);
}

// ─── Domain Messages ─────────────────────────────────────────

message Order {
  string id = 1;
  string tenant_id = 2;
  string seller_id = 3;
  string buyer_auth0_id = 4;
  string status = 5;
  common.v1.Money subtotal = 6;
  common.v1.Money commission = 7;
  common.v1.Money total = 8;
  string shipping_address_json = 9;
  string stripe_payment_intent_id = 10;
  repeated OrderLine lines = 11;
  google.protobuf.Timestamp paid_at = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  common.v1.Money shipping_fee = 15;
  // Seller company name captured at order creation time. Preserved even if
  // the seller is later deleted so buyer order history remains readable.
  string seller_name = 16;
}

message OrderLine {
  string id = 1;
  string order_id = 2;
  string sku_id = 3;
  string product_name = 4;
  string sku_code = 5;
  int32 quantity = 6;
  common.v1.Money unit_price = 7;
  common.v1.Money line_total = 8;
  // Product id snapshot (resolved from sku_id at checkout). Used by the
  // gateway to enrich order detail responses with current catalog data.
  string product_id = 9;
}

message Payout {
  string id = 1;
  string tenant_id = 2;
  string seller_id = 3;
  string order_id = 4;
  common.v1.Money amount = 5;
  string stripe_transfer_id = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp completed_at = 9;
}

// ─── CreateOrder (deprecated) ────────────────────────────────

message CreateOrderRequest {
  option deprecated = true;
  string tenant_id = 1;
  string seller_id = 2;
  string buyer_auth0_id = 3;
  repeated OrderLineInput lines = 4;
  string shipping_address_json = 5;
}

message OrderLineInput {
  option deprecated = true;
  string sku_id = 1;
  int32 quantity = 2;
}

message CreateOrderResponse {
  option deprecated = true;
  Order order = 1;
  string stripe_client_secret = 2;
}

// ─── CreateCheckout ──────────────────────────────────────────

// CreateCheckoutRequest carries a flat list of items across one or more
// sellers. The service groups by seller_id, creates one Order per group in
// a single transaction, and returns all order IDs sharing one PaymentIntent.
message CreateCheckoutRequest {
  string tenant_id = 1;
  string buyer_auth0_id = 2;
  string shipping_address_json = 3;
  string currency = 4;
  repeated CheckoutLineInput lines = 5;
}

// CheckoutLineInput includes seller_id and price snapshots from cart state.
// The order service re-validates prices against the catalog before insert.
message CheckoutLineInput {
  string sku_id = 1;
  string seller_id = 2;
  int32 quantity = 3;
  common.v1.Money unit_price_snapshot = 4;
  string product_name_snapshot = 5;
  string sku_code_snapshot = 6;
}

message CreateCheckoutResponse {
  repeated Order orders = 1;
  string stripe_client_secret = 2;
  string stripe_payment_intent_id = 3;
  common.v1.Money total = 4;
}

// ─── GetOrder ────────────────────────────────────────────────

message GetOrderRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetOrderResponse {
  Order order = 1;
}

// ─── ListOrders ──────────────────────────────────────────────

message ListBuyerOrdersRequest {
  string tenant_id = 1;
  string buyer_auth0_id = 2;
  common.v1.PaginationRequest pagination = 3;
}

message ListSellerOrdersRequest {
  string tenant_id = 1;
  string seller_id = 2;
  string status = 3;  // Optional filter
  common.v1.PaginationRequest pagination = 4;
}

message ListBuyerOrdersResponse {
  repeated Order orders = 1;
  common.v1.PaginationResponse pagination = 2;
}

message ListSellerOrdersResponse {
  repeated Order orders = 1;
  common.v1.PaginationResponse pagination = 2;
}

// ─── UpdateOrderStatus ───────────────────────────────────────

message UpdateOrderStatusRequest {
  string tenant_id = 1;
  string id = 2;
  string status = 3;  // paid, processing, shipped, delivered, completed, cancelled
}

message UpdateOrderStatusResponse {
  Order order = 1;
}

// ─── ListPayouts ─────────────────────────────────────────────

message ListPayoutsRequest {
  string tenant_id = 1;
  string seller_id = 2;
  common.v1.PaginationRequest pagination = 3;
}

message ListPayoutsResponse {
  repeated Payout payouts = 1;
  common.v1.PaginationResponse pagination = 2;
}

// ─── Order Cancellation Requests ─────────────────────────────

// CancellationRequest mirrors order_svc.order_cancellation_requests.
// The server (order service) is the authority for requested_by_auth0_id
// and processed_by_seller_id; clients must not trust these fields from
// request bodies and should rely on the authenticated caller's identity.
message CancellationRequest {
  string id = 1;
  string tenant_id = 2;
  string order_id = 3;
  string requested_by_auth0_id = 4;
  string reason = 5;
  // Status: pending, approved, rejected, failed.
  string status = 6;
  string seller_comment = 7;
  string processed_by_seller_id = 8;
  google.protobuf.Timestamp processed_at = 9;
  string stripe_refund_id = 10;
  string failure_reason = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message RequestOrderCancellationRequest {
  string tenant_id = 1;
  string order_id = 2;
  // buyer_auth0_id is resolved server-side from the authenticated
  // identity. Clients that set this field are ignored.
  string reason = 3;
}

message RequestOrderCancellationResponse {
  CancellationRequest request = 1;
}

message ApproveOrderCancellationRequest {
  string tenant_id = 1;
  string id = 2;  // cancellation request id
  string seller_comment = 3;  // optional
}

message ApproveOrderCancellationResponse {
  CancellationRequest request = 1;
}

message RejectOrderCancellationRequest {
  string tenant_id = 1;
  string id = 2;  // cancellation request id
  string seller_comment = 3;  // required — shown to the buyer
}

message RejectOrderCancellationResponse {
  CancellationRequest request = 1;
}

message ListOrderCancellationRequestsRequest {
  string tenant_id = 1;
  // Optional status filter. Defaults to "pending" server-side when
  // empty (seller dashboards land on pending-first).
  string status = 2;
  common.v1.PaginationRequest pagination = 3;
  // Seller scope. MUST be set — the server joins order_svc.orders on this
  // to prevent a multi-seller tenant from reading another seller's
  // cancellation reasons or buyer identifiers. See docs/order-cancellation.md.
  string seller_id = 4;
}

message ListOrderCancellationRequestsResponse {
  repeated CancellationRequest requests = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetOrderCancellationRequestRequest {
  string tenant_id = 1;
  string id = 2;
}

message GetOrderCancellationRequestResponse {
  CancellationRequest request = 1;
}
