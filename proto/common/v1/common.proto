syntax = "proto3";

package common.v1;

option go_package = "github.com/Riku-KANO/ec-test/gen/go/common/v1;commonv1";

import "google/protobuf/timestamp.proto";

// Money represents a monetary amount.
message Money {
  int64 amount = 1;   // Amount in smallest currency unit (e.g., cents/yen)
  string currency = 2; // ISO 4217 currency code (e.g., "JPY")
}

// PaginationRequest holds pagination parameters.
message PaginationRequest {
  int32 limit = 1;
  int32 offset = 2;
}

// PaginationResponse holds pagination metadata.
message PaginationResponse {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
}

// TenantContext carries tenant-scoped identity.
message TenantContext {
  string tenant_id = 1;
  string seller_id = 2;  // Empty for buyers and platform admins
  string user_id = 3;
  repeated string roles = 4;
}
